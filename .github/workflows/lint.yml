name: Lint

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-frontend:
    name: Lint Frontend (TypeScript/Angular)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          STORE_PATH=$(pnpm store path 2>/dev/null || echo "$HOME/.pnpm-store")
          echo "STORE_PATH=$STORE_PATH" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check commit message format (if commitlint configured)
        continue-on-error: true
        run: |
          if [ -f commitlint.config.mjs ]; then
            pnpm exec commitlint --from HEAD~1 --to HEAD --verbose || true
          fi

  lint-backend:
    name: Lint Backend (Rust)
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rust-version: ['stable']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust ${{ matrix.rust-version }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust-version }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust-version }}-

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check Rust formatting
        working-directory: src-tauri
        run: |
          cargo fmt --all -- --check || (echo "Run 'cargo fmt --all' to format the code" && exit 1)

  lint-combined:
    name: All Linting Checks
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend]

    steps:
      - name: Linting Summary
        run: |
          echo "✅ All linting checks passed"

