name: CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Full CI Pipeline
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          STORE_PATH=$(pnpm store path 2>/dev/null || echo "$HOME/.pnpm-store")
          echo "STORE_PATH=$STORE_PATH" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all checks
        shell: bash
        # UV_THREADPOOL_SIZE is lowered to work around an intermittent native
        # heap corruption (exit 3221226356 / 0xC0000374) in the Angular/esbuild
        # bundler on windows-latest; the build is also retried below.
        env:
          UV_THREADPOOL_SIZE: '2'
        run: |
          echo "Running comprehensive CI checks..."

          # Frontend linting
          echo "📋 Running ESLint..."
          pnpm lint || exit 1

          # Frontend tests
          echo "🧪 Running frontend tests..."
          pnpm test || exit 1

          # Build frontend for Rust tests (Tauri needs dist folder)
          echo "🏗️ Building frontend..."
          build_ok=0
          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            if pnpm build; then build_ok=1; break; fi
            echo "Build attempt $attempt failed; retrying..."
          done
          [ "$build_ok" = "1" ] || { echo "Build failed after 3 attempts" >&2; exit 1; }

          # Rust linting
          echo "🦀 Running Rust clippy..."
          rustup component add clippy || true
          cd src-tauri
          cargo clippy --all-targets --all-features -- -D warnings || exit 1

          # Rust formatting check
          echo "✨ Checking Rust formatting..."
          cargo fmt --all -- --check || exit 1

          # Rust tests (single-threaded: the Windows COM teardown is not safe to
          # run concurrently across the test harness's threads)
          echo "🧪 Running Rust tests..."
          cargo test --verbose -- --test-threads=1 || exit 1

          echo "✅ All CI checks passed!"

